steps:
  - label: ":bazel: Build"
    command:
      - curl -sSL https://github.com/bazelbuild/bazelisk/releases/latest/download/bazelisk-linux-amd64 -o /usr/local/bin/bazel
      - chmod +x /usr/local/bin/bazel
      - bazel build //...

  - label: ":bazel: Test"
    command:
      - curl -sSL https://github.com/bazelbuild/bazelisk/releases/latest/download/bazelisk-linux-amd64 -o /usr/local/bin/bazel
      - chmod +x /usr/local/bin/bazel
      - bazel query 'tests(//...)' 2>/dev/null > test-selectors.txt
      - bktec run --selector-file test-selectors.txt
      # bazel-testlogs is a symlink into Bazel's output base, and the
      # test-collector plugin's glob doesn't follow symlinked directories,
      # so copy (dereferencing with -L) the XML files to a real path first.
      - mkdir -p test-results && cp -rL bazel-testlogs/. test-results/
    parallelism: 3
    plugins:
      - tests#v1.0.0:
          test-runner: custom
          debug_enabled: true
          test-cmd: "bazel test --test_output=errors {{testExamples}}"
      - test-collector#v1.11.0:
          format: junit
          files: "test-results/**/test.xml"
    artifact_paths:
      - "test-results/**/test.xml"
      - "test-selectors.txt"
    env:
      BUILDKITE_TEST_ENGINE_SELECTOR_SPLITTING: true
